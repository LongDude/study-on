version: "3.1"

services:
  nginx:
    image: nginx:1.29-alpine
    working_dir: /app
    volumes:
      - ${PWD}:/app
      - ./docker/hosts/app.conf:/etc/nginx/conf.d/default.conf
      - ./docker/hosts/symfony:/etc/nginx/symfony
    ports:
      - "${NGINX_PORT}:80"
    links:
      - php

  postgres:
    ports:  #Нельзя использовать проброс портов на реальном проекте
      - "127.0.0.1:5432:5432"
    image: postgres:18.3-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
        interval: 30s
        timeout: 60s
        retries: 5

  php:
    build: docker/images/php
    working_dir: /app
    user: ${UID:-1000}:${GID:-1000}
    volumes:
      - ${PWD}:/app
      - ${HOME}/.composer:/.composer
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=${APP_ENV}
    env_file:
      - .env
      - .env.local
    links:
      - postgres

  pgadmin:
      image: dpage/pgadmin4:7.2
      env_file:
          - .env
          - .env.local
      environment:
          PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@mail.com}
          PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-5678pgadmin}
          PGADMIN_LISTEN_PORT: 80
      volumes:
          - pgadmin:/var/lib/pgadmin
      links:
          - postgres
      depends_on:
          - postgres
      ports:
          - "8081:80"
      profiles: [all, dev, test]

  node:
    image: node:alpine
    environment:
        - YARN_CACHE_FOLDER=/yarn
    working_dir: /app
    user: ${UID:-1000}:${GID:-1000}
    volumes:
        - ${PWD}:/app
        - ${HOME}/.yarn:/yarn

volumes:
    postgres_data:
    pgadmin:
